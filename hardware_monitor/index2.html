<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Performance Monitor - Integration Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f3f4f6; transition: background-color 0.3s; }
        .chart-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .chart-card.hidden { display: none; }
        .chart-container { height: 300px; min-height: 280px; transition: height 0.3s ease; }
        .main-chart-container { height: 350px; transition: height 0.3s ease; }

        /* Expanded Modal State */
        .chart-card.expanded {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100; margin: 0; border-radius: 0; padding: 2rem;
            background: white;
        }
        .chart-card.expanded .chart-container,
        .chart-card.expanded .main-chart-container {
            height: calc(100vh - 160px) !important;
        }
        body.modal-open { overflow: hidden; }
        
        .toggle-btn { opacity: 0; transition: opacity 0.2s; }
        .chart-card:hover .toggle-btn { opacity: 1; }

        /* Layout Grid Definitions */
        .grid-layout-top { display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .grid-layout-top.mode-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid-layout-top.mode-grid { grid-template-columns: repeat(3, 1fr); } }

        .grid-layout-bottom { display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .grid-layout-bottom.mode-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1280px) { .grid-layout-bottom.mode-grid { grid-template-columns: repeat(2, 1fr); } } 
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="mb-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Advanced System Monitor</h1>
                <p class="text-gray-600">Integratable Telemetry Dashboard</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex bg-white rounded-lg shadow-sm border border-gray-100 p-1">
                    <button id="btn-grid" onclick="setLayout('grid')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all bg-blue-600 text-white shadow-sm">Grid</button>
                    <button id="btn-list" onclick="setLayout('list')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700 hover:bg-gray-50">List</button>
                </div>

                <div class="relative">
                    <input type="text" id="chart-filter" placeholder="Filter charts..." class="pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-sm w-48 md:w-64">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100">
                    <span class="text-sm font-medium text-gray-500 ml-2">Sim Update:</span>
                    <select id="interval-select" class="text-sm border-none focus:ring-0 cursor-pointer font-bold text-blue-600 bg-transparent">
                        <option value="1000">1s</option>
                        <option value="500">0.5s</option>
                        <option value="0">Stop Demo</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- TOP ROW: CLUSTERS -->
        <div class="grid-layout-top mode-grid mb-6" id="charts-grid-top">
            <!-- Big Cluster -->
            <div class="chart-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 group" data-title="Big Cluster Performance" id="card-big">
                <button onclick="toggleExpand('card-big', 'big')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                <h2 class="text-sm font-bold text-red-600 uppercase tracking-wider mb-2">Big Cluster</h2>
                <div id="cpu-big-chart" class="chart-container w-full"></div>
            </div>
            <!-- Mid Cluster -->
            <div class="chart-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 group" data-title="Mid Cluster Balanced" id="card-mid">
                <button onclick="toggleExpand('card-mid', 'mid')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                <h2 class="text-sm font-bold text-amber-600 uppercase tracking-wider mb-2">Mid Cluster</h2>
                <div id="cpu-mid-chart" class="chart-container w-full"></div>
            </div>
            <!-- Little Cluster -->
            <div class="chart-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 group" data-title="Little Cluster Efficiency" id="card-little">
                <button onclick="toggleExpand('card-little', 'little')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                <h2 class="text-sm font-bold text-emerald-600 uppercase tracking-wider mb-2">Little Cluster</h2>
                <div id="cpu-little-chart" class="chart-container w-full"></div>
            </div>
        </div>

        <!-- BOTTOM ROW: SYSTEM STATS -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-2 gap-6" id="charts-grid-bottom">
            <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 group" data-title="SoC Temperatures" id="card-temp">
                <button onclick="toggleExpand('card-temp', 'temp')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Temperatures (°C)</h2>
                <div id="temp-chart" class="main-chart-container w-full"></div>
            </div>
            <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 group" data-title="Power Rails" id="card-power">
                <button onclick="toggleExpand('card-power', 'power')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Power (Watts)</h2>
                <div id="power-chart" class="main-chart-container w-full"></div>
            </div>
            <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 group" data-title="Frame Rate" id="card-fps">
                <button onclick="toggleExpand('card-fps', 'fps')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">Frame Rate (FPS)</h2>
                    <div id="fps-current-avg" class="text-xs font-mono text-gray-500">
                        CUR: <span id="val-fps-cur" class="text-blue-600 font-bold">0</span>
                    </div>
                </div>
                <div id="fps-chart" class="main-chart-container w-full"></div>
            </div>
            <!-- Efficiency Chart -->
            <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 group border-blue-100" data-title="Efficiency FPS per Watt" id="card-eff">
                <button onclick="toggleExpand('card-eff', 'eff')" class="toggle-btn absolute top-4 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">Efficiency (FPS/W)</h2>
                    <div class="text-xs font-mono text-gray-500">
                        CUR: <span id="val-eff-cur" class="text-emerald-600 font-bold">0.00</span>
                    </div>
                </div>
                <div id="eff-chart" class="main-chart-container w-full"></div>
            </div>
        </div>
    </div>

    <script>
        /**
         * ==========================================
         * 1. CONFIGURATION & CONSTANTS
         * ==========================================
         */
        const CLUSTERS = {
            big: { count: 2, color: '#ef4444', label: 'Big Core' },
            mid: { count: 2, color: '#f59e0b', label: 'Mid Core' },
            little: { count: 4, color: '#10b981', label: 'Little Core' }
        };
        const MAX_HISTORY = 30; 
        const THEME_COLORS = { 
            temp: ['#f97316', '#8b5cf6'], 
            power: ['#ec4899', '#06b6d4'], 
            fps: '#3b82f6',
            eff: '#10b981'
        };

        /**
         * ==========================================
         * 2. STATE MANAGEMENT
         * ==========================================
         */
        const state = {
            categories: Array(MAX_HISTORY).fill(''),
            cpu: {
                big: Array.from({ length: 2 }, () => ({ load: Array(MAX_HISTORY).fill(0), freq: Array(MAX_HISTORY).fill(0) })),
                mid: Array.from({ length: 2 }, () => ({ load: Array(MAX_HISTORY).fill(0), freq: Array(MAX_HISTORY).fill(0) })),
                little: Array.from({ length: 4 }, () => ({ load: Array(MAX_HISTORY).fill(0), freq: Array(MAX_HISTORY).fill(0) }))
            },
            temp: { cpu: Array(MAX_HISTORY).fill(0), gpu: Array(MAX_HISTORY).fill(0) },
            power: { pkg: Array(MAX_HISTORY).fill(0), dram: Array(MAX_HISTORY).fill(0) },
            fps: Array(MAX_HISTORY).fill(0),
            eff: Array(MAX_HISTORY).fill(0)
        };

        /**
         * ==========================================
         * 3. CHART INITIALIZATION
         * ==========================================
         */
        const charts = {};
        function initCharts() {
            const baseOpt = (yLabel, yMin, yMax) => ({
                animation: false,
                tooltip: { trigger: 'axis', axisPointer: { animation: false } },
                grid: { top: 15, left: 40, right: 10, bottom: 25 },
                xAxis: { 
                    type: 'category', 
                    data: state.categories, 
                    boundaryGap: false, 
                    axisLabel: { show: false },
                    axisTick: { show: false },
                    axisLine: { show: false }
                },
                yAxis: { type: 'value', min: yMin, max: yMax, splitLine: { lineStyle: { type: 'dashed', color: '#f3f4f6' } }, axisLabel: { fontSize: 10, formatter: yLabel } }
            });

            Object.keys(CLUSTERS).forEach(key => {
                charts[key] = echarts.init(document.getElementById(`cpu-${key}-chart`));
                const series = [];
                CLUSTERS[key].count.times(i => {
                    series.push({ name: `${CLUSTERS[key].label} ${i+1} Load`, type: 'line', showSymbol: false, smooth: true, z: 10, lineStyle: { width: 2, color: CLUSTERS[key].color }, data: state.cpu[key][i].load });
                    series.push({ name: `${CLUSTERS[key].label} ${i+1} Freq`, type: 'line', showSymbol: false, smooth: true, z: 5, areaStyle: { color: CLUSTERS[key].color, opacity: 0.1 }, lineStyle: { width: 1, color: CLUSTERS[key].color, opacity: 0.3, type: 'dotted' }, data: state.cpu[key][i].freq });
                });
                charts[key].setOption({ ...baseOpt('{value}%', 0, 100), series });
            });

            charts.temp = echarts.init(document.getElementById('temp-chart'));
            charts.temp.setOption({ 
                ...baseOpt('{value}°', 30, 100), 
                series: [
                    { name: 'CPU', type: 'line', showSymbol: false, smooth: true, itemStyle: { color: THEME_COLORS.temp[0] }, data: state.temp.cpu }, 
                    { name: 'GPU', type: 'line', showSymbol: false, smooth: true, itemStyle: { color: THEME_COLORS.temp[1] }, data: state.temp.gpu }
                ] 
            });

            charts.power = echarts.init(document.getElementById('power-chart'));
            charts.power.setOption({ 
                ...baseOpt('{value}W', 0, 120), 
                series: [
                    { name: 'Pkg', type: 'line', showSymbol: false, smooth: true, areaStyle: { opacity: 0.05 }, itemStyle: { color: THEME_COLORS.power[0] }, data: state.power.pkg }, 
                    { name: 'DRAM', type: 'line', showSymbol: false, smooth: true, areaStyle: { opacity: 0.05 }, itemStyle: { color: THEME_COLORS.power[1] }, data: state.power.dram }
                ] 
            });

            charts.fps = echarts.init(document.getElementById('fps-chart'));
            charts.fps.setOption({ 
                ...baseOpt('{value}', 0, 144), 
                series: [{ 
                    name: 'Current FPS', 
                    type: 'line', 
                    showSymbol: false,
                    step: 'end', 
                    lineStyle: { color: THEME_COLORS.fps, width: 2 }, 
                    areaStyle: { color: THEME_COLORS.fps, opacity: 0.1 }, 
                    data: state.fps
                }] 
            });

            charts.eff = echarts.init(document.getElementById('eff-chart'));
            charts.eff.setOption({ 
                ...baseOpt('{value}', 0, 10), 
                series: [{ 
                    name: 'FPS per Watt', 
                    type: 'line', 
                    showSymbol: false,
                    smooth: true,
                    lineStyle: { color: THEME_COLORS.eff, width: 2 }, 
                    areaStyle: { color: THEME_COLORS.eff, opacity: 0.1 }, 
                    data: state.eff
                }] 
            });
        }

        /**
         * ==========================================
         * 4. PUBLIC INTEGRATION API
         * ==========================================
         */
        function updateSystemMonitor(data) {
            state.categories.shift();
            state.categories.push(data.timestamp);
            const sync = { xAxis: { data: state.categories } };

            Object.keys(CLUSTERS).forEach(key => {
                const clusterUpdate = [];
                data.cpu[key].forEach((core, i) => {
                    state.cpu[key][i].load.shift(); state.cpu[key][i].load.push(core.load);
                    state.cpu[key][i].freq.shift(); state.cpu[key][i].freq.push(core.freq);
                    clusterUpdate.push({ data: state.cpu[key][i].load }, { data: state.cpu[key][i].freq });
                });
                if (!isChartHidden(`card-${key}`)) charts[key].setOption({ ...sync, series: clusterUpdate });
            });

            const updateStat = (stateArr, newVal) => { stateArr.shift(); stateArr.push(newVal); };
            updateStat(state.temp.cpu, data.temp.cpu); updateStat(state.temp.gpu, data.temp.gpu);
            updateStat(state.power.pkg, data.power.pkg); updateStat(state.power.dram, data.power.dram);
            updateStat(state.fps, data.fps);

            // Calculate Efficiency (FPS/W)
            const effVal = data.power.pkg > 0 ? (data.fps / data.power.pkg) : 0;
            updateStat(state.eff, parseFloat(effVal.toFixed(2)));

            if (!isChartHidden('card-temp')) charts.temp.setOption({ ...sync, series: [{ data: state.temp.cpu }, { data: state.temp.gpu }] });
            if (!isChartHidden('card-power')) charts.power.setOption({ ...sync, series: [{ data: state.power.pkg }, { data: state.power.dram }] });
            
            if (!isChartHidden('card-fps')) {
                document.getElementById('val-fps-cur').innerText = Math.round(data.fps);
                charts.fps.setOption({ ...sync, series: [{ data: state.fps }] });
            }

            if (!isChartHidden('card-eff')) {
                document.getElementById('val-eff-cur').innerText = effVal.toFixed(2);
                charts.eff.setOption({ ...sync, series: [{ data: state.eff }] });
            }
        }

        /**
         * ==========================================
         * 5. UI & UTILITIES
         * ==========================================
         */
        Number.prototype.times = function(cb) { for(let i=0; i<this; i++) cb(i); };
        function isChartHidden(id) { return document.getElementById(id).classList.contains('hidden'); }

        function setLayout(mode) {
            const grids = [document.getElementById('charts-grid-top'), document.getElementById('charts-grid-bottom')];
            const btns = { grid: document.getElementById('btn-grid'), list: document.getElementById('btn-list') };
            grids.forEach(g => {
                if(mode === 'grid') {
                    g.classList.add('mode-grid');
                    if(g.id === 'charts-grid-bottom') {
                        g.className = "grid-layout-bottom mode-grid";
                    }
                } else {
                    g.classList.remove('mode-grid');
                    if(g.id === 'charts-grid-bottom') {
                        g.className = "grid-layout-bottom";
                    }
                }
            });
            btns.grid.className = mode === 'grid' ? 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white shadow-sm' : 'px-4 py-1.5 text-sm font-bold text-gray-500';
            btns.list.className = mode === 'list' ? 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white shadow-sm' : 'px-4 py-1.5 text-sm font-bold text-gray-500';
            setTimeout(() => Object.values(charts).forEach(c => c.resize()), 50);
        }

        function toggleExpand(cardId, chartKey) {
            const card = document.getElementById(cardId);
            const isExp = card.classList.toggle('expanded');
            document.body.classList.toggle('modal-open', isExp);
            setTimeout(() => charts[chartKey].resize(), 310);
        }

        document.getElementById('chart-filter').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.chart-card').forEach(card => {
                card.classList.toggle('hidden', !card.getAttribute('data-title').toLowerCase().includes(term));
            });
            Object.values(charts).forEach(c => c.resize());
        });

        window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { const exp = document.querySelector('.chart-card.expanded'); if (exp) toggleExpand(exp.id, exp.id.split('-')[1]); } });

        /**
         * ==========================================
         * 6. DEMO SIMULATION
         * ==========================================
         */
        let demoInterval = null;
        function runDemo() {
            const load = () => Math.max(5, Math.min(95, 20 + Math.random() * 60));
            updateSystemMonitor({
                timestamp: new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' }),
                cpu: {
                    big: Array.from({ length: 2 }, () => ({ load: load(), freq: load() * 0.8 })),
                    mid: Array.from({ length: 2 }, () => ({ load: load() * 0.6, freq: load() * 0.5 })),
                    little: Array.from({ length: 4 }, () => ({ load: load() * 0.3, freq: load() * 0.2 }))
                },
                temp: { cpu: 40 + Math.random() * 30, gpu: 35 + Math.random() * 20 },
                power: { pkg: 10 + Math.random() * 80, dram: 2 + Math.random() * 10 },
                fps: 55 + Math.random() * 10
            });
        }

        document.getElementById('interval-select').addEventListener('change', (e) => {
            clearInterval(demoInterval);
            const val = parseInt(e.target.value);
            if (val > 0) demoInterval = setInterval(runDemo, val);
        });

        initCharts();
        demoInterval = setInterval(runDemo, 1000);
    </script>
</body>
</html>
