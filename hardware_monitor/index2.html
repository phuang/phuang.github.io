<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* --- Base Styles & Transitions --- */
        body { 
            background-color: #f3f4f6; 
            transition: background-color 0.3s; 
        }

        .chart-card { 
            transition: all 0.2s ease-in-out; 
            position: relative; 
            /* Enforce a minimum width to prevent header text and metrics from wrapping */
            min-width: 400px;
        }

        .chart-card.hidden { display: none; }

        .chart-container { 
            height: 300px; 
            transition: height 0.3s ease; 
        }
        
        /* --- Expansion Modal View --- */
        .chart-card.expanded {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            z-index: 100; 
            margin: 0; 
            border-radius: 0; 
            padding: 2rem; 
            background: white;
            min-width: auto; 
        }

        .chart-card.expanded .chart-container { 
            height: calc(100vh - 160px) !important; 
        }

        body.modal-open { overflow: hidden; }
        
        /* Expansion Button styling */
        .toggle-btn { 
            opacity: 0; 
            transition: all 0.2s; 
        }

        .chart-card:hover .toggle-btn { opacity: 1; }

        .cur-badge { font-family: ui-monospace, monospace; }
        
        /* --- Layout Transitions --- */
        .grid-layout { 
            display: grid; 
            gap: 1.5rem; 
            transition: all 0.3s ease; 
        }
        
        /* --- Tracing Status Indicators --- */
        #device-id { transition: all 0.2s ease; }
        .tracing-active .status-dot { color: #4ade80; }
        .tracing-inactive .status-dot { color: #f87171; }
        .tracing-inactive { opacity: 0.8; filter: grayscale(0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Dashboard Header -->
        <header class="mb-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
            <div class="flex-shrink-0">
                <h1 class="text-3xl font-bold text-gray-800">Advanced System Monitor</h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 flex-1">
                <!-- View Controls -->
                <div class="flex bg-white rounded-lg shadow-sm border border-gray-100 p-1 flex-shrink-0">
                    <button id="btn-grid" onclick="UI.setLayout('grid')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all bg-blue-600 text-white shadow-sm">Grid</button>
                    <button id="btn-list" onclick="UI.setLayout('list')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700">List</button>
                </div>

                <!-- Search Input -->
                <div class="relative flex-1 min-w-[200px]">
                    <input type="text" id="chart-filter" oninput="UI.filterCharts(this.value)" placeholder="Filter (e.g. CPU|TEMP)..." class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>

                <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100 flex-shrink-0">
                    <span class="text-sm font-medium text-gray-500 ml-2">Rate:</span>
                    <select id="interval-select" onchange="Sim.updateRate(this.value)" class="text-sm border-none focus:ring-0 cursor-pointer font-bold text-blue-600 bg-transparent mr-2">
                        <option value="1000">1.0s</option>
                        <option value="500">0.5s</option>
                        <option value="0">Paused</option>
                    </select>
                </div>

                <!-- Device Badge (Clickable Toggle) -->
                <button id="device-id" onclick="Monitor.toggleTracing()" class="tracing-active inline-flex items-center px-3 py-1.5 rounded-md text-sm font-bold bg-gray-800 text-white border border-gray-700 shadow-sm font-mono hover:bg-gray-700 active:scale-95 transition-all outline-none focus:ring-2 focus:ring-blue-500 flex-shrink-0">
                    <svg class="status-dot w-3.5 h-3.5 mr-2 transition-colors duration-300" fill="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="8"/>
                    </svg>
                    <span id="device-name-text">Initializing...</span>
                    <span id="tracing-status" class="ml-2 text-[10px] uppercase opacity-50 tracking-tighter">(Live)</span>
                </button>

                <button id="btn-save" onclick="Settings.saveManual()" class="px-5 py-2 bg-gray-800 text-white text-sm font-bold rounded-lg shadow-sm hover:bg-gray-700 transition-colors flex items-center gap-2 flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Save
                </button>
            </div>
        </header>

        <!-- Dynamic Grid Containers -->
        <div class="grid-layout mb-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3" id="grid-top"></div>
        <div class="grid-layout grid-cols-1 md:grid-cols-2" id="grid-bottom"></div>
    </div>

    <script>
        /**
         * ==========================================
         * 1. CONFIGURATION
         * ==========================================
         */
        const BIG_CORES = 1;
        const MID_CORES = 4;
        const LITTLE_CORES = 2;

        const CONFIG = {
            DEVICE_NAME: "Android Pixel 8 Pro", 
            STORAGE_KEY: 'sys_monitor_settings_manual_v4',
            HISTORY_LEN: 60,
            CHART_SMOOTH: true,
            CHART_STEP: false,
            AREA_OPACITY: 0.05,
            HEADER_TITLE_STYLE: "text-sm font-bold uppercase tracking-wider whitespace-nowrap",

            // Reordered CPU Clusters: Lit, Med, Big
            CLUSTERS: [
                { id: 'little', name: 'Lit Cluster', color: '#10b981', cores: LITTLE_CORES, maxGHz: 1.8, keywords: 'cpu processor efficiency little lit' },
                { id: 'mid',    name: 'Mid Cluster',    color: '#f59e0b', cores: MID_CORES, maxGHz: 2.4, keywords: 'cpu processor balanced mid med' },
                { id: 'big',    name: 'Big Cluster',    color: '#ef4444', cores: BIG_CORES, maxGHz: 3.2, keywords: 'cpu processor cores big' }
            ],
            STATS: [
                { 
                    id: 'temp', 
                    title: 'Temperatures (°C)', 
                    color: '#f97316',
                    readouts: [
                        { id: 'temp-pkg', label: 'CPU Pkg', color: '#f97316', unit: '°C' },
                        { id: 'temp-gpu', label: 'GPU Core', color: '#8b5cf6', unit: '°C' }
                    ]
                },
                { 
                    id: 'power', 
                    title: 'Power Consumption (mW)', 
                    color: '#ec4899',
                    readouts: [
                        { id: 'power-pkg', label: 'Pkg', color: '#ec4899', unit: 'mW', hasArea: true },
                        { id: 'power-dram', label: 'DRAM', color: '#06b6d4', unit: 'mW', hasArea: true }
                    ]
                },
                { 
                    id: 'fps', 
                    title: 'Frame Rate (FPS)', 
                    color: '#3b82f6',
                    readouts: [{ id: 'fps', label: 'FPS', color: '#3b82f6', unit: '', hasArea: true }]
                },
                { 
                    id: 'eff', 
                    title: 'Efficiency (FPS/mW)', 
                    color: '#10b981',
                    readouts: [{ id: 'eff', label: 'FPS/mW', color: '#10b981', unit: '', hasArea: true }]
                }
            ]
        };

        const Settings = {
            data: { layout: 'grid', filter: '', simRate: '1000' },
            saveManual() {
                this.data.layout = document.getElementById('grid-top').classList.contains('grid-cols-1') ? 'list' : 'grid';
                this.data.filter = document.getElementById('chart-filter').value;
                this.data.simRate = document.getElementById('interval-select').value;
                localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.data));
                this._showSaveFeedback();
            },
            _showSaveFeedback() {
                const btn = document.getElementById('btn-save');
                const originalContent = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Saved`;
                btn.classList.add('bg-green-600'); btn.classList.remove('bg-gray-800');
                setTimeout(() => { btn.innerHTML = originalContent; btn.classList.remove('bg-green-600'); btn.classList.add('bg-gray-800'); }, 2000);
            },
            load() {
                const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (stored) { try { this.data = { ...this.data, ...JSON.parse(stored) }; } catch (e) {} }
            },
            apply() {
                UI.setLayout(this.data.layout);
                document.getElementById('chart-filter').value = this.data.filter;
                UI.filterCharts(this.data.filter);
                document.getElementById('interval-select').value = this.data.simRate;
                Sim.updateRate(this.data.simRate);
            }
        };

        const Monitor = {
            charts: {},
            isTracing: true, 
            state: { categories: Array(CONFIG.HISTORY_LEN).fill('') },

            init() {
                UI.renderCards(); 
                this._initCPUCharts();
                this._initStatCharts();
                window.addEventListener('resize', () => { Object.values(this.charts).forEach(c => c.resize()); });
                Settings.load(); Settings.apply();
                this.setDevice(CONFIG.DEVICE_NAME);
            },

            toggleTracing() {
                this.isTracing = !this.isTracing;
                const btn = document.getElementById('device-id');
                const statusTxt = document.getElementById('tracing-status');
                if (this.isTracing) {
                    btn.classList.replace('tracing-inactive', 'tracing-active'); statusTxt.innerText = "(Live)";
                } else {
                    btn.classList.replace('tracing-active', 'tracing-inactive'); statusTxt.innerText = "(Stopped)";
                }
            },

            setDevice(name) { document.getElementById('device-name-text').innerText = name || "Unknown Device"; },

            push(data) {
                if (!this.isTracing) return;
                this.state.categories.shift();
                this.state.categories.push(data.timestamp);
                this._updateClusters(data.cpu);
                this._updateStats(data);
            },

            _updateClusters(cpuData) {
                CONFIG.CLUSTERS.forEach(c => {
                    const clusterMetrics = cpuData[c.id];
                    if (!clusterMetrics) return;
                    const avgL = Math.round(clusterMetrics.reduce((s, x) => s + x.load, 0) / c.cores);
                    const avgF = clusterMetrics.reduce((s, x) => s + x.freq, 0) / c.cores;
                    const loadEl = document.getElementById(`val-${c.id}-load-cur`);
                    const freqEl = document.getElementById(`val-${c.id}-freq-cur`);
                    if (loadEl) loadEl.innerText = `${avgL}%`;
                    if (freqEl) freqEl.innerText = `${avgF.toFixed(2)} GHz`;
                    this._updateChartData(c.id, clusterMetrics.flatMap(core => [core.load, core.freq]));
                });
            },

            _updateStats(data) {
                const pkgTempEl = document.getElementById('val-temp-pkg-cur');
                const gpuTempEl = document.getElementById('val-temp-gpu-cur');
                const pkgPwrEl = document.getElementById('val-power-pkg-cur');
                const dramPwrEl = document.getElementById('val-power-dram-cur');
                const fpsEl = document.getElementById('val-fps-cur');
                const effEl = document.getElementById('val-eff-cur');

                if (pkgTempEl) pkgTempEl.innerText = `${Math.round(data.temp.pkg)}°C`;
                if (gpuTempEl) gpuTempEl.innerText = `${Math.round(data.temp.gpu)}°C`;
                if (pkgPwrEl) pkgPwrEl.innerText = `${Math.round(data.power.pkg)}mW`;
                if (dramPwrEl) dramPwrEl.innerText = `${Math.round(data.power.dram)}mW`;
                if (fpsEl) fpsEl.innerText = Math.round(data.fps);
                
                // Efficiency calculation updated to FPS/mW (Frames per milliwatt)
                const eff = data.power.pkg > 0 ? (data.fps / data.power.pkg) : 0;
                if (effEl) effEl.innerText = eff.toFixed(4); // Increased precision for milli-scale

                this._updateChartData('temp', [data.temp.pkg, data.temp.gpu]);
                this._updateChartData('power', [data.power.pkg, data.power.dram]);
                this._updateChartData('fps', [data.fps]);
                this._updateChartData('eff', [eff]);
            },

            _updateChartData(key, values) {
                const chart = this.charts[key];
                const card = document.getElementById(`chart-${key}`)?.parentElement;
                if (!chart || card?.classList.contains('hidden')) return;
                const options = chart.getOption();
                if (!options.series || options.series.length === 0) return;
                const seriesUpdate = values.map((val, idx) => {
                    if (!options.series[idx]) return { data: [] };
                    const data = options.series[idx].data || [];
                    data.shift();
                    data.push(val);
                    return { data };
                });
                chart.setOption({ xAxis: { data: this.state.categories }, series: seriesUpdate });
            },

            _getChartDefaults(yAxisConfig = {}) {
                return {
                    animation: false,
                    tooltip: { trigger: 'axis', axisPointer: { animation: false } },
                    // containLabel: true handles dynamic width automatically
                    grid: { top: 30, left: 10, right: 15, bottom: 10, containLabel: true },
                    xAxis: { type: 'category', data: this.state.categories, boundaryGap: false, axisLabel: { show: false }, axisTick: { show: false }, axisLine: { show: false } },
                    yAxis: { 
                        splitLine: { lineStyle: { type: 'dashed', color: '#f3f4f6' } }, 
                        axisLabel: { fontSize: 10 },
                        scale: true, // Scales based on data range
                        ...yAxisConfig 
                    },
                    series: []
                };
            },

            _initCPUCharts() {
                CONFIG.CLUSTERS.forEach(c => {
                    const el = document.getElementById(`chart-${c.id}`);
                    if (!el) return;
                    const inst = echarts.init(el);
                    const opt = this._getChartDefaults();
                    opt.yAxis = [
                        { type: 'value', min: 0, max: 100, axisLabel: { formatter: '{value}%' } },
                        { type: 'value', min: 0, max: c.maxGHz, axisLabel: { formatter: '{value}G' }, splitLine: { show: false } }
                    ];
                    for (let i = 0; i < c.cores; i++) {
                        opt.series.push(
                            { name: `C${i+1} L`, type: 'line', showSymbol: false, smooth: CONFIG.CHART_SMOOTH, lineStyle: { width: 2, color: c.color }, data: Array(CONFIG.HISTORY_LEN).fill(0), yAxisIndex: 0, tooltip: { valueFormatter: (val) => val.toFixed(2) + '%' } },
                            { name: `C${i+1} F`, type: 'line', showSymbol: false, smooth: CONFIG.CHART_SMOOTH, areaStyle: { color: c.color, opacity: 0.1 }, lineStyle: { width: 1, color: c.color, type: 'dotted' }, data: Array(CONFIG.HISTORY_LEN).fill(0), yAxisIndex: 1, tooltip: { valueFormatter: (val) => val.toFixed(2) + ' GHz' } }
                        );
                    }
                    inst.setOption(opt); this.charts[c.id] = inst;
                });
            },

            _initStatCharts() {
                CONFIG.STATS.forEach(s => {
                    const el = document.getElementById(`chart-${s.id}`);
                    if (!el) return;
                    const inst = echarts.init(el);
                    const opt = this._getChartDefaults({ axisLabel: { formatter: `{value}${s.readouts[0].unit}` } });
                    opt.series = s.readouts.map((r) => ({
                        name: r.label, type: 'line', showSymbol: false, smooth: CONFIG.CHART_SMOOTH, step: CONFIG.CHART_STEP, itemStyle: { color: r.color }, areaStyle: r.hasArea ? { opacity: CONFIG.AREA_OPACITY } : null, data: Array(CONFIG.HISTORY_LEN).fill(0), tooltip: { valueFormatter: (val) => val.toFixed(4) + (r.unit || '') }
                    }));
                    inst.setOption(opt); this.charts[s.id] = inst;
                });
            }
        };

        const UI = {
            renderCards() {
                const topGrid = document.getElementById('grid-top');
                const bottomGrid = document.getElementById('grid-bottom');
                if (!topGrid || !bottomGrid) return;

                CONFIG.CLUSTERS.forEach(c => {
                    topGrid.insertAdjacentHTML('beforeend', `
                        <div class="chart-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 min-w-0 overflow-hidden group">
                            <div class="flex justify-between items-start mb-2 flex-nowrap">
                                <h2 class="${CONFIG.HEADER_TITLE_STYLE}" style="color: ${c.color}">${c.name}</h2>
                                <div class="flex items-center gap-3 flex-nowrap">
                                    <div class="flex gap-3 text-right flex-nowrap">
                                        <div class="whitespace-nowrap"><span class="text-[9px] text-gray-400 uppercase font-bold block">Avg Load</span><div id="val-${c.id}-load-cur" class="cur-badge text-xs font-bold" style="color: ${c.color}">--%</div></div>
                                        <div class="border-l border-gray-100 pl-3 whitespace-nowrap"><span class="text-[9px] text-gray-400 uppercase font-bold block">Avg Freq</span><div id="val-${c.id}-freq-cur" class="cur-badge text-xs font-bold opacity-80" style="color: ${c.color}">-- GHz</div></div>
                                    </div>
                                    <button onclick="UI.toggleExpand(this, '${c.id}')" class="toggle-btn p-1 rounded-md hover:bg-gray-100 text-gray-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                                </div>
                            </div>
                            <div id="chart-${c.id}" class="chart-container w-full"></div>
                        </div>`);
                });

                CONFIG.STATS.forEach(s => {
                    bottomGrid.insertAdjacentHTML('beforeend', `
                        <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 min-w-0 overflow-hidden group">
                            <div class="flex justify-between items-start mb-4 flex-nowrap">
                                <h2 class="${CONFIG.HEADER_TITLE_STYLE}" style="color: ${s.color}">${s.title}</h2>
                                <div class="flex items-center gap-4 flex-nowrap">
                                    <div class="flex gap-4 flex-nowrap">
                                        ${s.readouts.map((r, i) => `
                                            <div class="text-right ${i > 0 ? 'border-l border-gray-100 pl-4' : ''} whitespace-nowrap">
                                                <span class="text-[10px] text-gray-400 uppercase font-bold block">${r.label}</span>
                                                <div id="val-${r.id}-cur" class="cur-badge text-xs font-bold" style="color: ${r.color}">--${r.unit}</div>
                                            </div>`).join('')}
                                    </div>
                                    <button onclick="UI.toggleExpand(this, '${s.id}')" class="toggle-btn p-1 rounded-md hover:bg-gray-100 text-gray-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                                </div>
                            </div>
                            <div id="chart-${s.id}" class="chart-container w-full"></div>
                        </div>`);
                });
            },
            setLayout(mode) {
                const gTop = document.getElementById('grid-top'), gBottom = document.getElementById('grid-bottom');
                const bGrid = document.getElementById('btn-grid'), bList = document.getElementById('btn-list');
                const isGrid = mode === 'grid';
                if (gTop) { gTop.classList.toggle('grid-cols-1', !isGrid); gTop.classList.toggle('md:grid-cols-2', isGrid); gTop.classList.toggle('lg:grid-cols-3', isGrid); }
                if (gBottom) { gBottom.classList.toggle('grid-cols-1', !isGrid); gBottom.classList.toggle('md:grid-cols-2', isGrid); }
                if (bGrid && bList) { bGrid.className = isGrid ? 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white shadow-sm' : 'px-4 py-1.5 text-sm font-bold text-gray-500'; bList.className = !isGrid ? 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white shadow-sm' : 'px-4 py-1.5 text-sm font-bold text-gray-500'; }
                this._forceResize();
            },
            toggleExpand(btn, key) {
                const card = btn.closest('.chart-card'); const isExp = card.classList.toggle('expanded');
                document.body.classList.toggle('modal-open', isExp);
                setTimeout(() => { if (Monitor.charts[key]) Monitor.charts[key].resize(); }, 300);
            },
            filterCharts(val) {
                const rawVal = val.toLowerCase().trim();
                const keywords = rawVal.split('|').map(k => k.trim()).filter(k => k.length > 0);
                document.querySelectorAll('.chart-card').forEach(c => {
                    const searchable = c.innerHTML.toLowerCase(); 
                    const matches = keywords.length === 0 || keywords.some(k => searchable.includes(k));
                    c.classList.toggle('hidden', !matches);
                });
                this._forceResize();
            },
            _forceResize() { setTimeout(() => { Object.values(Monitor.charts).forEach(c => c.resize()); }, 150); }
        };

        const Sim = {
            interval: null,
            updateRate(ms) { clearInterval(this.interval); if (ms > 0) this.interval = setInterval(() => this.tick(), ms); },
            tick() {
                const getLoad = (base) => Math.max(5, Math.min(95, base + (Math.random() - 0.5) * 40));
                Monitor.push({
                    timestamp: new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' }),
                    cpu: {
                        big: Array.from({ length: BIG_CORES }, () => { 
                            const l = getLoad(50); return { load: l, freq: 0.8 + (l/100)*2.4 }; 
                        }),
                        mid: Array.from({ length: MID_CORES }, () => { 
                            const l = getLoad(30); return { load: l, freq: 0.6 + (l/100)*1.8 }; 
                        }),
                        little: Array.from({ length: LITTLE_CORES }, () => { 
                            const l = getLoad(10); return { load: l, freq: 0.4 + (l/100)*1.4 }; 
                        })
                    },
                    temp: { pkg: 40 + Math.random() * 20, gpu: 38 + Math.random() * 15 },
                    power: { pkg: 800 + Math.random() * 1200, dram: 100 + Math.random() * 400 },
                    fps: 59 + Math.random() * 2
                });
            }
        };

        Monitor.init();

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const exp = document.querySelector('.chart-card.expanded');
                if (exp) {
                    const btn = exp.querySelector('.toggle-btn');
                    const key = Object.keys(Monitor.charts).find(k => exp.innerHTML.includes(k)) || 'fps';
                    UI.toggleExpand(btn, key);
                }
            }
        });
    </script>
</body>
</html>
