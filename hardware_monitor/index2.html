<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced System Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f3f4f6; transition: background-color 0.3s; }
        
        /* Chart Cards & Layout */
        .chart-card { transition: all 0.2s ease-in-out; position: relative; min-width: 400px; }
        .chart-card.hidden { display: none; }
        .chart-container { height: 300px; transition: height 0.3s ease; }
        
        /* Fullscreen Expansion */
        .chart-card.expanded {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100; margin: 0; border-radius: 0; padding: 2rem; 
            background: white; min-width: auto; 
        }
        .chart-card.expanded .chart-container { height: calc(100vh - 160px) !important; }
        body.modal-open { overflow: hidden; }
        
        /* Interactions */
        .toggle-btn { opacity: 0; transition: all 0.2s; }
        .chart-card:hover .toggle-btn { opacity: 1; }
        .font-mono-stat { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        
        .grid-layout { display: grid; gap: 1.5rem; transition: all 0.3s ease; }
        
        /* Status Indicators */
        #device-status-badge { transition: all 0.2s ease; }
        .tracing-active .status-dot { color: #4ade80; }
        .tracing-inactive .status-dot { color: #f87171; opacity: 0.6; }
        .tracing-inactive { filter: grayscale(0.5); opacity: 0.8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Main Toolbar -->
        <header class="mb-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
            <div class="flex-shrink-0">
                <h1 class="text-3xl font-bold text-gray-800">Advanced System Monitor</h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 flex-1">
                <!-- View Mode Toggle -->
                <div class="flex bg-white rounded-lg shadow-sm border border-gray-100 p-1 flex-shrink-0">
                    <button id="btn-grid" onclick="UI.setLayout('grid')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all bg-blue-600 text-white">Grid</button>
                    <button id="btn-list" onclick="UI.setLayout('list')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700">List</button>
                </div>

                <!-- Live Search Filter -->
                <div class="relative flex-1 min-w-[200px]">
                    <input type="text" id="chart-filter" oninput="UI.filterCharts(this.value)" placeholder="Filter clusters or stats..." class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <!-- Update Frequency -->
                <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100 flex-shrink-0">
                    <span class="text-sm font-medium text-gray-500 ml-2">Rate:</span>
                    <select id="interval-select" onchange="Monitor.updateRate(this.value)" class="text-sm border-none focus:ring-0 cursor-pointer font-bold text-blue-600 bg-transparent">
                        <option value="1000">1.0s</option>
                        <option value="500">0.5s</option>
                        <option value="0">Paused</option>
                    </select>
                </div>

                <!-- Device & Tracing Toggle -->
                <button id="device-status-badge" onclick="Monitor.toggleTracing()" class="tracing-active inline-flex items-center px-3 py-1.5 rounded-md text-sm font-bold bg-gray-800 text-white border border-gray-700 shadow-sm font-mono hover:bg-gray-700 active:scale-95 transition-all flex-shrink-0">
                    <svg class="status-dot w-3.5 h-3.5 mr-2 transition-colors duration-300" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                    <span id="device-name-display">Android Pixel 8 Pro</span>
                    <span id="tracing-label" class="ml-2 text-[10px] uppercase opacity-50">(Live)</span>
                </button>

                <button onclick="Monitor.saveConfig()" class="px-5 py-2 bg-gray-800 text-white text-sm font-bold rounded-lg shadow-sm hover:bg-gray-700 transition-colors flex items-center gap-2 flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    Save
                </button>
            </div>
        </header>

        <!-- Dynamic Content Areas -->
        <div class="grid-layout mb-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3" id="area-cpu"></div>
        <div class="grid-layout grid-cols-1 md:grid-cols-2" id="area-stats"></div>
    </div>

    <script>
        /**
         * ==========================================
         * 1. SYSTEM HARDWARE TOPOLOGY
         * ==========================================
         */
        const CORES = { BIG: 1, MID: 4, LITTLE: 2 };
        const HISTORY_LIMIT = 60; 

        /**
         * ==========================================
         * 2. CONFIGURATION & THEME
         * ==========================================
         */
        const Theme = {
            colors: {
                lit: '#10b981', mid: '#f59e0b', big: '#ef4444',
                temp: '#f97316', power: '#ec4899', fps: '#3b82f6'
            },
            styles: {
                title: "text-sm tracking-wider whitespace-nowrap",
                statLabel: "text-[9px] text-gray-400 uppercase font-bold block"
            }
        };

        const CONFIG = {
            CLUSTERS: [
                { id: 'little', name: 'Lit Cluster', color: Theme.colors.lit, cores: CORES.LITTLE, maxGHz: 1.8 },
                { id: 'mid',    name: 'Mid Cluster', color: Theme.colors.mid, cores: CORES.MID,    maxGHz: 2.4 },
                { id: 'big',    name: 'Big Cluster', color: Theme.colors.big, cores: CORES.BIG,    maxGHz: 3.2 }
            ],
            STATS: [
                { 
                    id: 'temp', title: 'Temperatures (°C)', color: Theme.colors.temp,
                    readouts: [
                        { id: 'temp-pkg', label: 'CPU Pkg', color: Theme.colors.temp, unit: '°C' },
                        { id: 'temp-gpu', label: 'GPU Core', color: '#8b5cf6', unit: '°C' }
                    ]
                },
                { 
                    id: 'power', title: 'Power Consumption (mW)', color: Theme.colors.power,
                    readouts: [
                        { id: 'power-pkg', label: 'Pkg', color: Theme.colors.power, unit: 'mW', area: true },
                        { id: 'power-dram', label: 'DRAM', color: '#06b6d4', unit: 'mW', area: true }
                    ]
                },
                { 
                    id: 'fps', title: 'Frame Rate (FPS)', color: Theme.colors.fps,
                    readouts: [{ id: 'fps', label: 'FPS', color: Theme.colors.fps, unit: '', area: true }]
                },
                { 
                    id: 'eff', title: 'Efficiency (FPS/mW)', color: Theme.colors.lit,
                    readouts: [{ id: 'eff', label: 'Eff', color: Theme.colors.lit, unit: '', area: true }]
                }
            ]
        };

        /**
         * ==========================================
         * 3. MONITOR ENGINE
         * ==========================================
         */
        const Monitor = {
            instances: {},
            active: true,
            timer: null,
            timeline: Array(HISTORY_LIMIT).fill(''),

            init() {
                UI.buildCards();
                this._setupCharts();
                window.addEventListener('resize', () => Object.values(this.instances).forEach(i => i.resize()));
                
                setTimeout(() => Object.values(this.instances).forEach(i => i.resize()), 50);
                setTimeout(() => Object.values(this.instances).forEach(i => i.resize()), 300);
                
                this.updateRate(1000);
            },

            toggleTracing() {
                this.active = !this.active;
                const badge = document.getElementById('device-status-badge');
                const label = document.getElementById('tracing-label');
                badge.classList.toggle('tracing-active', this.active);
                badge.classList.toggle('tracing-inactive', !this.active);
                label.innerText = this.active ? "(Live)" : "(Stopped)";
            },

            updateRate(ms) {
                clearInterval(this.timer);
                if (ms > 0) this.timer = setInterval(() => this._tick(), ms);
            },

            _tick() {
                if (!this.active) return;
                
                const now = new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' });
                this.timeline.shift();
                this.timeline.push(now);

                const rand = (min, range) => min + Math.random() * range;
                const cpuLoad = (base) => Math.max(5, Math.min(95, base + (Math.random() - 0.5) * 40));

                const data = {
                    cpu: {
                        little: Array.from({length: CORES.LITTLE}, () => ({ load: cpuLoad(10), freq: rand(0.4, 1.0) })),
                        mid: Array.from({length: CORES.MID}, () => ({ load: cpuLoad(30), freq: rand(0.8, 1.2) })),
                        big: Array.from({length: CORES.BIG}, () => ({ load: cpuLoad(60), freq: rand(1.8, 1.2) }))
                    },
                    temp: { pkg: rand(40, 20), gpu: rand(38, 15) },
                    power: { pkg: rand(800, 1500), dram: rand(100, 400) },
                    fps: rand(59, 2)
                };

                this._updateUI(data);
            },

            _updateUI(data) {
                CONFIG.CLUSTERS.forEach(c => {
                    const metrics = data.cpu[c.id];
                    const avgL = (metrics.reduce((s, x) => s + x.load, 0) / c.cores).toFixed(2);
                    const avgF = (metrics.reduce((s, x) => s + x.freq, 0) / c.cores).toFixed(2);
                    const loadEl = document.getElementById(`val-${c.id}-load`);
                    const freqEl = document.getElementById(`val-${c.id}-freq`);
                    if (loadEl) loadEl.innerText = `${avgL}%`;
                    if (freqEl) freqEl.innerText = `${avgF} GHz`;
                    this._pushChartData(c.id, metrics.flatMap(m => [m.load, m.freq]));
                });

                const eff = data.power.pkg > 0 ? (data.fps / data.power.pkg) : 0;
                const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
                
                setVal('val-temp-pkg-cur', `${Math.round(data.temp.pkg)}°C`);
                setVal('val-temp-gpu-cur', `${Math.round(data.temp.gpu)}°C`);
                setVal('val-power-pkg-cur', `${Math.round(data.power.pkg)}mW`);
                setVal('val-power-dram-cur', `${Math.round(data.power.dram)}mW`);
                setVal('val-fps-cur', Math.round(data.fps));
                setVal('val-eff-cur', eff.toFixed(2));

                this._pushChartData('temp', [data.temp.pkg, data.temp.gpu]);
                this._pushChartData('power', [data.power.pkg, data.power.dram]);
                this._pushChartData('fps', [data.fps]);
                this._pushChartData('eff', [eff]);
            },

            _pushChartData(key, values) {
                const chart = this.instances[key];
                if (!chart) return;
                
                const opt = chart.getOption();
                const seriesUpdate = values.map((val, idx) => {
                    const series = opt.series[idx];
                    if (!series) return { data: [] };
                    const data = series.data || [];
                    data.shift();
                    data.push(val);
                    return { data };
                });

                chart.setOption({ xAxis: { data: this.timeline }, series: seriesUpdate });
            },

            _setupCharts() {
                CONFIG.CLUSTERS.forEach(c => {
                    const el = document.getElementById(`chart-${c.id}`);
                    const inst = echarts.init(el);
                    const series = [];
                    for(let i=0; i<c.cores; i++) {
                        series.push(
                            { 
                                name: `C${i+1} L`, 
                                type: 'line', 
                                showSymbol: false, 
                                smooth: true, 
                                lineStyle: { width: 1.2, color: c.color }, 
                                data: Array(HISTORY_LIMIT).fill(0), 
                                yAxisIndex: 0,
                                tooltip: { valueFormatter: (val) => val.toFixed(2) + '%' }
                            },
                            { 
                                name: `C${i+1} F`, 
                                type: 'line', 
                                showSymbol: false, 
                                smooth: true, 
                                areaStyle: { color: c.color, opacity: 0.05 }, 
                                lineStyle: { width: 0.8, color: c.color, type: 'dotted' }, 
                                data: Array(HISTORY_LIMIT).fill(0), 
                                yAxisIndex: 1,
                                tooltip: { valueFormatter: (val) => val.toFixed(2) + ' GHz' }
                            }
                        );
                    }
                    inst.setOption(this._getSharedOptions({ 
                        tooltip: {
                            trigger: 'axis',
                            confine: true, // Forces tooltip to stay inside chart area
                            formatter: (params) => {
                                let html = `<div class="p-1 min-w-[140px] text-xs">`;
                                html += `<div class="font-bold mb-1 border-b border-gray-100 pb-1">${params[0].axisValue}</div>`;
                                
                                const loadParams = params.filter(p => p.seriesName.endsWith('L'));
                                const freqParams = params.filter(p => p.seriesName.endsWith('F'));

                                if (loadParams.length > 0) {
                                    html += `<div class="text-[10px] uppercase font-bold text-gray-400 mt-1 mb-1">Load (%)</div>`;
                                    loadParams.forEach(p => {
                                        html += `<div class="flex justify-between items-center gap-4">
                                            <span>${p.marker} ${p.seriesName}</span>
                                            <span class="font-mono font-bold">${p.value.toFixed(2)}%</span>
                                        </div>`;
                                    });
                                }

                                if (freqParams.length > 0) {
                                    html += `<div class="text-[10px] uppercase font-bold text-gray-400 mt-2 mb-1">Freq (GHz)</div>`;
                                    freqParams.forEach(p => {
                                        html += `<div class="flex justify-between items-center gap-4">
                                            <span>${p.marker} ${p.seriesName}</span>
                                            <span class="font-mono font-bold">${p.value.toFixed(2)} GHz</span>
                                        </div>`;
                                    });
                                }

                                html += `</div>`;
                                return html;
                            }
                        },
                        grid: { top: 30, left: 10, right: 15, bottom: 10, containLabel: true },
                        yAxis: [
                            { type: 'value', min: 0, max: 100, axisLabel: { formatter: '{value}%' } },
                            { type: 'value', min: 0, max: c.maxGHz, axisLabel: { formatter: (value) => value.toFixed(1) }, splitLine: { show: false } }
                        ],
                        series 
                    }));
                    this.instances[c.id] = inst;
                });

                CONFIG.STATS.forEach(s => {
                    const el = document.getElementById(`chart-${s.id}`);
                    const inst = echarts.init(el);
                    inst.setOption(this._getSharedOptions({
                        yAxis: { scale: true, axisLabel: { formatter: `{value}${s.readouts[0].unit}` } },
                        series: s.readouts.map(r => ({
                            name: r.label, 
                            type: 'line', 
                            showSymbol: false, 
                            smooth: true, 
                            lineStyle: { width: 1.2 },
                            itemStyle: { color: r.color }, 
                            areaStyle: r.area ? { opacity: 0.05 } : null, 
                            data: Array(HISTORY_LIMIT).fill(0),
                            tooltip: { valueFormatter: (val) => val.toFixed(2) + (r.unit || '') }
                        }))
                    }));
                    this.instances[s.id] = inst;
                });
            },

            _getSharedOptions(ext) {
                return {
                    animation: false,
                    tooltip: { 
                        trigger: 'axis', 
                        confine: true, // Global safety for tooltips
                        axisPointer: { animation: false } 
                    },
                    grid: { top: 30, left: 10, right: 10, bottom: 10, containLabel: true },
                    xAxis: { type: 'category', data: this.timeline, boundaryGap: false, axisLabel: { show: false }, axisTick: { show: false }, axisLine: { show: false } },
                    yAxis: { splitLine: { lineStyle: { type: 'dashed', color: '#e5e7eb' } }, axisLabel: { fontSize: 10 } },
                    ...ext
                };
            },

            saveConfig() {
                const btn = event.currentTarget;
                btn.classList.add('bg-green-600');
                setTimeout(() => btn.classList.remove('bg-green-600'), 2000);
            }
        };

        /**
         * ==========================================
         * 4. UI CONTROLLER
         * ==========================================
         */
        const UI = {
            buildCards() {
                const cpuArea = document.getElementById('area-cpu');
                const statArea = document.getElementById('area-stats');

                CONFIG.CLUSTERS.forEach(c => {
                    cpuArea.insertAdjacentHTML('beforeend', `
                        <div class="chart-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 min-w-0 overflow-hidden group">
                            <div class="flex justify-between items-start mb-2 flex-nowrap">
                                <h2 class="${Theme.styles.title}" style="color: ${c.color}">${c.name}</h2>
                                <div class="flex items-center gap-3">
                                    <div class="flex gap-3 text-right">
                                        <div><span class="${Theme.styles.statLabel}">Avg Load</span><div id="val-${c.id}-load" class="font-mono-stat text-xs font-bold" style="color: ${c.color}">--%</div></div>
                                        <div class="border-l border-gray-100 pl-3">
                                            <span class="${Theme.styles.statLabel}">Avg Freq</span>
                                            <div id="val-${c.id}-freq" class="font-mono-stat text-[10px] px-1.5 py-0.5 mt-0.5 rounded font-bold" style="color: ${c.color}; background-color: ${c.color}15">-- GHz</div>
                                        </div>
                                    </div>
                                    <button onclick="UI.toggleExpand(this, '${c.id}')" class="toggle-btn p-1 rounded-md hover:bg-gray-100 text-gray-400">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div id="chart-${c.id}" class="chart-container w-full"></div>
                        </div>`);
                });

                CONFIG.STATS.forEach(s => {
                    statArea.insertAdjacentHTML('beforeend', `
                        <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 min-w-0 overflow-hidden group">
                            <div class="flex justify-between items-start mb-4 flex-nowrap">
                                <h2 class="${Theme.styles.title}" style="color: ${s.color}">${s.title}</h2>
                                <div class="flex items-center gap-4">
                                    <div class="flex gap-4">
                                        ${s.readouts.map(r => `
                                            <div class="text-right whitespace-nowrap">
                                                <span class="${Theme.styles.statLabel}">${r.label}</span>
                                                <div id="val-${r.id}-cur" class="font-mono-stat text-xs font-bold" style="color: ${r.color}">--${r.unit}</div>
                                            </div>`).join('')}
                                    </div>
                                    <button onclick="UI.toggleExpand(this, '${s.id}')" class="toggle-btn p-1 rounded-md hover:bg-gray-100 text-gray-400">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div id="chart-${s.id}" class="chart-container w-full"></div>
                        </div>`);
                });
            },

            setLayout(mode) {
                const isGrid = mode === 'grid';
                ['area-cpu', 'area-stats'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.classList.toggle('grid-cols-1', !isGrid);
                    if (id === 'area-cpu') {
                        el.classList.toggle('md:grid-cols-2', isGrid);
                        el.classList.toggle('lg:grid-cols-3', isGrid);
                    } else {
                        el.classList.toggle('md:grid-cols-2', isGrid);
                    }
                });
                
                const gridBtn = document.getElementById('btn-grid');
                const listBtn = document.getElementById('btn-list');
                if (gridBtn) gridBtn.className = isGrid ? 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white' : 'px-4 py-1.5 text-sm font-bold text-gray-500';
                if (listBtn) listBtn.className = !isGrid ? 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white' : 'px-4 py-1.5 text-sm font-bold text-gray-500';
                
                setTimeout(() => Object.values(Monitor.instances).forEach(i => i.resize()), 150);
            },

            toggleExpand(btn, key) {
                const card = btn.closest('.chart-card');
                const isExpanded = card.classList.toggle('expanded');
                document.body.classList.toggle('modal-open', isExpanded);
                setTimeout(() => Monitor.instances[key]?.resize(), 300);
            },

            filterCharts(val) {
                const query = val.toLowerCase().trim();
                document.querySelectorAll('.chart-card').forEach(card => {
                    const content = card.innerHTML.toLowerCase();
                    card.classList.toggle('hidden', query !== '' && !content.includes(query));
                });
                setTimeout(() => Object.values(Monitor.instances).forEach(i => i.resize()), 150);
            }
        };

        Monitor.init();

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const expanded = document.querySelector('.chart-card.expanded');
                if (expanded) {
                    const btn = expanded.querySelector('.toggle-btn');
                    const key = Object.keys(Monitor.instances).find(k => expanded.querySelector(`#chart-${k}`)) || 'fps';
                    UI.toggleExpand(btn, key);
                }
            }
        });
    </script>
</body>
</html>
