<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor Dashboard + AI Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f3f4f6; transition: background-color 0.3s; }
        .chart-card { transition: all 0.2s ease-in-out; position: relative; }
        .chart-card.hidden { display: none; }
        .chart-container { height: 300px; transition: height 0.3s ease; }
        
        /* Expansion View Styles */
        .chart-card.expanded {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100; margin: 0; border-radius: 0; padding: 2rem; background: white;
        }
        .chart-card.expanded .chart-container { height: calc(100vh - 160px) !important; }
        body.modal-open { overflow: hidden; }
        
        .toggle-btn { opacity: 0; transition: opacity 0.2s; }
        .chart-card:hover .toggle-btn { opacity: 1; }

        .cur-badge { font-family: ui-monospace, monospace; }
        
        /* Smooth grid transitions */
        .grid-layout { display: grid; gap: 1.5rem; transition: all 0.3s ease; }

        /* AI Panel Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .ai-panel-active { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Dashboard Header -->
        <header class="mb-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Advanced System Monitor</h1>
                <div class="flex items-center gap-3">
                    <!-- Device Badge (Moved here as the new subtitle) -->
                    <span id="device-id" class="inline-flex items-center px-2.5 py-1 rounded-md text-sm font-bold bg-gray-800 text-white border border-gray-700 shadow-sm font-mono">
                        <svg class="w-3.5 h-3.5 mr-1.5 text-green-400" fill="currentColor" viewBox="0 0 24 24"><path d="M7 11h2v2H7v-2m14-5v12c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2m-2 0H5v12h14V6m-9 7V9H7v4h3m4 0v-4h-3v4h3m2-11h-4v2h4V2z"/></svg>
                        <span id="device-name-text">Initializing...</span>
                    </span>
                    <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full">✨ Gemini AI Powered</span>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <!-- AI Analyst Action -->
                <button onclick="AI.analyzeSystem()" class="px-5 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-sm font-bold rounded-lg shadow-md hover:shadow-lg transition-all flex items-center gap-2 group">
                    <span class="group-hover:animate-pulse">✨</span> Analyze Health
                </button>

                <!-- Layout Selection -->
                <div class="flex bg-white rounded-lg shadow-sm border border-gray-100 p-1">
                    <button id="btn-grid" onclick="UI.setLayout('grid')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all bg-blue-600 text-white shadow-sm">Grid</button>
                    <button id="btn-list" onclick="UI.setLayout('list')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700">List</button>
                </div>

                <!-- Live Search -->
                <div class="relative">
                    <input type="text" id="chart-filter" oninput="UI.filterCharts(this.value)" placeholder="Filter (e.g. CPU|TEMP)..." class="pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-sm w-48 md:w-64">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100">
                    <span class="text-sm font-medium text-gray-500 ml-2">Rate:</span>
                    <select id="interval-select" onchange="Sim.updateRate(this.value)" class="text-sm border-none focus:ring-0 cursor-pointer font-bold text-blue-600 bg-transparent mr-2">
                        <option value="1000">1.0s</option>
                        <option value="500">0.5s</option>
                        <option value="0">Paused</option>
                    </select>
                </div>

                <button id="btn-save" onclick="Settings.saveManual()" class="px-5 py-2 bg-gray-800 text-white text-sm font-bold rounded-lg shadow-sm hover:bg-gray-700 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Save
                </button>
            </div>
        </header>

        <!-- AI Insights Banner (Conditional) -->
        <div id="ai-report-container" class="hidden mb-8 bg-white border border-blue-200 rounded-2xl overflow-hidden shadow-sm ai-panel-active">
            <div class="bg-blue-50 px-6 py-4 flex justify-between items-center border-b border-blue-100">
                <div class="flex items-center gap-2">
                    <span class="text-xl">✨</span>
                    <h3 class="font-bold text-blue-900">Gemini System Insights</h3>
                </div>
                <button onclick="AI.closeReport()" class="text-blue-400 hover:text-blue-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="ai-report-content" class="p-6 text-gray-700 prose prose-blue max-w-none">
                <div class="flex items-center gap-3 animate-pulse">
                    <div class="h-4 w-4 bg-blue-400 rounded-full"></div>
                    <p>Gemini is analyzing your system telemetry data...</p>
                </div>
            </div>
        </div>

        <div class="grid-layout mb-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3" id="grid-top"></div>
        <div class="grid-layout grid-cols-1 md:grid-cols-2" id="grid-bottom"></div>
    </div>

    <script>
        /**
         * ==========================================
         * 1. CONFIGURATION
         * ==========================================
         */
        const CONFIG = {
            DEVICE_NAME: "Android Pixel 8 Pro", 
            STORAGE_KEY: 'sys_monitor_settings_manual_v2',
            HISTORY_LEN: 60,
            
            // Visual Config Defaults
            CHART_SMOOTH: true,
            CHART_STEP: false,
            AREA_OPACITY: 0.05,
            
            CLUSTERS: [
                { id: 'big',    name: 'Big Cluster',    color: '#ef4444', cores: 2, maxGHz: 3.2, keywords: 'cpu processor cores' },
                { id: 'mid',    name: 'Mid Cluster',    color: '#f59e0b', cores: 2, maxGHz: 2.4, keywords: 'cpu processor balanced' },
                { id: 'little', name: 'Little Cluster', color: '#10b981', cores: 4, maxGHz: 1.8, keywords: 'cpu processor efficiency' }
            ],
            STATS: [
                { 
                    id: 'temp', 
                    title: 'Temperatures (°C)', 
                    keywords: 'soc thermals package heat',
                    readouts: [
                        { id: 'temp-pkg', label: 'CPU Pkg', color: '#f97316', min: 30, max: 100, unit: '°C', hasArea: false },
                        { id: 'temp-gpu', label: 'GPU Core', color: '#8b5cf6', min: 30, max: 100, unit: '°C', hasArea: false }
                    ]
                },
                { 
                    id: 'power', 
                    title: 'Power Consumption (W)', 
                    keywords: 'wattage battery energy consumption package dram',
                    readouts: [
                        { id: 'power-pkg', label: 'Pkg', color: '#ec4899', min: 0, max: 120, unit: 'W', hasArea: true },
                        { id: 'power-dram', label: 'DRAM', color: '#06b6d4', min: 0, max: 120, unit: 'W', hasArea: true }
                    ]
                },
                { 
                    id: 'fps', 
                    title: 'Frame Rate (FPS)', 
                    keywords: 'performance framerate graphics display',
                    readouts: [{ id: 'fps', label: 'FPS', color: '#3b82f6', min: 0, max: 144, unit: '', hasArea: true }]
                },
                { 
                    id: 'eff', 
                    title: 'Efficiency (FPS/W)', 
                    keywords: 'performance ratio battery life energy',
                    readouts: [{ id: 'eff', label: 'FPS/W', color: '#10b981', min: 0, max: 10, unit: '', hasArea: true }]
                }
            ]
        };

        /**
         * ==========================================
         * 2. GEMINI AI MODULE ✨
         * ==========================================
         */
        const AI = {
            isAnalyzing: false,
            apiKey: "", 

            async analyzeSystem() {
                if (this.isAnalyzing) return;
                this.isAnalyzing = true;

                const reportContainer = document.getElementById('ai-report-container');
                const reportContent = document.getElementById('ai-report-content');
                
                reportContainer.classList.remove('hidden');
                reportContent.innerHTML = `<div class="flex items-center gap-3"><div class="animate-spin h-5 w-5 border-2 border-blue-600 border-t-transparent rounded-full"></div><p class="font-medium text-blue-800">Processing real-time telemetry with Gemini 2.5 Flash...</p></div>`;

                window.scrollTo({ top: 0, behavior: 'smooth' });

                const snapshot = {
                    device: document.getElementById('device-name-text').innerText,
                    averages: {
                        big_cluster: document.getElementById('val-big-load-cur').innerText,
                        mid_cluster: document.getElementById('val-mid-load-cur').innerText,
                        temp_cpu: document.getElementById('val-temp-pkg-cur').innerText,
                        power_pkg: document.getElementById('val-power-pkg-cur').innerText,
                        fps: document.getElementById('val-fps-cur').innerText,
                        efficiency: document.getElementById('val-eff-cur').innerText
                    }
                };

                const prompt = `Analyze this system telemetry snapshot for device: ${snapshot.device}:
                    - CPU Load: Big Cluster (${snapshot.averages.big_cluster}), Mid (${snapshot.averages.mid_cluster})
                    - Temperature: CPU Package at ${snapshot.averages.temp_cpu}
                    - Power: Package Power at ${snapshot.averages.power_pkg}
                    - Graphics: Running at ${snapshot.averages.fps} FPS
                    - Overall Efficiency: ${snapshot.averages.efficiency} FPS/W

                    Identify if there is thermal throttling, power bottlenecks, or if the system is highly efficient. Give 3 short, punchy bullet points and a concluding recommendation. Format with clear Markdown.`;

                try {
                    const result = await this._callGemini(prompt);
                    reportContent.innerHTML = this._parseMarkdown(result);
                } catch (err) {
                    reportContent.innerHTML = `<div class="p-3 bg-red-50 text-red-700 rounded-lg">Failed to contact AI Analyst. Please check connection and try again.</div>`;
                } finally {
                    this.isAnalyzing = false;
                }
            },

            async _callGemini(userQuery, retries = 5) {
                const systemPrompt = "You are a senior systems performance architect. Your goal is to analyze telemetry data and provide extremely technical yet concise insights. Use professional, clinical language. Do not use conversational filler.";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${this.apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                    }
                }
            },

            _parseMarkdown(text) {
                return text
                    .replace(/^### (.*$)/gim, '<h4 class="font-bold text-gray-800 mt-4">$1</h4>')
                    .replace(/^## (.*$)/gim, '<h3 class="font-bold text-gray-900 mt-4">$1</h3>')
                    .replace(/^\- (.*$)/gim, '<li class="ml-4 list-disc text-gray-600">$1</li>')
                    .replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-700 font-bold">$1</b>')
                    .replace(/\n/g, '<br>');
            },

            closeReport() {
                document.getElementById('ai-report-container').classList.add('hidden');
            }
        };

        /**
         * ==========================================
         * 3. SETTINGS ENGINE
         * ==========================================
         */
        const Settings = {
            data: { layout: 'grid', filter: '', simRate: '1000' },
            saveManual() {
                this.data.layout = document.getElementById('grid-top').classList.contains('grid-cols-1') ? 'list' : 'grid';
                this.data.filter = document.getElementById('chart-filter').value;
                this.data.simRate = document.getElementById('interval-select').value;
                localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.data));
                
                const btn = document.getElementById('btn-save');
                const originalContent = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Saved`;
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-gray-800');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-gray-800');
                }, 2000);
            },
            load() {
                const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (stored) { try { this.data = { ...this.data, ...JSON.parse(stored) }; } catch (e) {} }
            },
            apply() {
                UI.setLayout(this.data.layout);
                document.getElementById('chart-filter').value = this.data.filter;
                UI.filterCharts(this.data.filter);
                document.getElementById('interval-select').value = this.data.simRate;
                Sim.updateRate(this.data.simRate);
            }
        };

        /**
         * ==========================================
         * 4. MONITOR ENGINE
         * ==========================================
         */
        const Monitor = {
            charts: {},
            state: { categories: Array(CONFIG.HISTORY_LEN).fill('') },

            init() {
                UI.renderCards(); 
                this._initCPU();
                this._initStats();
                window.addEventListener('resize', () => Object.values(this.charts).forEach(c => c.resize()));
                Settings.load();
                Settings.apply();
                
                this.setDevice(CONFIG.DEVICE_NAME);
            },

            setDevice(name) {
                document.getElementById('device-name-text').innerText = name || "Unknown Device";
            },

            push(data) {
                this.state.categories.shift();
                this.state.categories.push(data.timestamp);

                CONFIG.CLUSTERS.forEach(c => {
                    const clusterData = data.cpu[c.id];
                    const avgL = Math.round(clusterData.reduce((s, x) => s + x.load, 0) / c.cores);
                    const avgF = clusterData.reduce((s, x) => s + x.freq, 0) / c.cores;
                    document.getElementById(`val-${c.id}-load-cur`).innerText = `${avgL}%`;
                    document.getElementById(`val-${c.id}-freq-cur`).innerText = `${avgF.toFixed(2)} GHz`;
                    this._updateChart(c.id, clusterData.flatMap(core => [core.load, core.freq]));
                });

                document.getElementById('val-temp-pkg-cur').innerText = `${Math.round(data.temp.pkg)}°C`;
                document.getElementById('val-temp-gpu-cur').innerText = `${Math.round(data.temp.gpu)}°C`;
                document.getElementById('val-power-pkg-cur').innerText = `${Math.round(data.power.pkg)}W`;
                document.getElementById('val-power-dram-cur').innerText = `${Math.round(data.power.dram)}W`;
                document.getElementById('val-fps-cur').innerText = Math.round(data.fps);
                
                const eff = data.power.pkg > 0 ? (data.fps / data.power.pkg) : 0;
                document.getElementById('val-eff-cur').innerText = eff.toFixed(2);

                this._updateChart('temp', [data.temp.pkg, data.temp.gpu]);
                this._updateChart('power', [data.power.pkg, data.power.dram]);
                this._updateChart('fps', [data.fps]);
                this._updateChart('eff', [eff]);
            },

            _updateChart(key, values) {
                const chart = this.charts[key];
                if (!chart || document.getElementById(`chart-${key}`).parentElement.classList.contains('hidden')) return;
                const options = chart.getOption();
                const seriesUpdate = values.map((val, idx) => {
                    const data = options.series[idx].data;
                    data.shift(); data.push(val);
                    return { data };
                });
                chart.setOption({ xAxis: { data: this.state.categories }, series: seriesUpdate });
            },

            _baseOpt(yAxis = {}) {
                return {
                    animation: false,
                    tooltip: { trigger: 'axis', axisPointer: { animation: false } },
                    grid: { top: 15, left: 40, right: 10, bottom: 25 },
                    xAxis: { type: 'category', data: this.state.categories, boundaryGap: false, axisLabel: { show: false }, axisTick: { show: false }, axisLine: { show: false } },
                    yAxis: { splitLine: { lineStyle: { type: 'dashed', color: '#f3f4f6' } }, axisLabel: { fontSize: 10 }, ...yAxis },
                    series: []
                };
            },

            _initCPU() {
                CONFIG.CLUSTERS.forEach(c => {
                    const inst = echarts.init(document.getElementById(`chart-${c.id}`));
                    const opt = this._baseOpt();
                    opt.grid.right = 40;
                    opt.yAxis = [
                        { type: 'value', min: 0, max: 100, axisLabel: { formatter: '{value}%' } },
                        { type: 'value', min: 0, max: c.maxGHz, axisLabel: { formatter: '{value}G' }, splitLine: { show: false } }
                    ];
                    for (let i = 0; i < c.cores; i++) {
                        opt.series.push(
                            { 
                                name: `C${i+1} Load`, 
                                type: 'line', 
                                showSymbol: false, 
                                smooth: CONFIG.CHART_SMOOTH, 
                                lineStyle: { width: 2, color: c.color }, 
                                data: Array(CONFIG.HISTORY_LEN).fill(0), 
                                yAxisIndex: 0,
                                tooltip: { valueFormatter: (val) => val.toFixed(2) + '%' }
                            },
                            { 
                                name: `C${i+1} Freq`, 
                                type: 'line', 
                                showSymbol: false, 
                                smooth: CONFIG.CHART_SMOOTH, 
                                areaStyle: { color: c.color, opacity: 0.1 }, 
                                lineStyle: { width: 1, color: c.color, type: 'dotted' }, 
                                data: Array(CONFIG.HISTORY_LEN).fill(0), 
                                yAxisIndex: 1,
                                tooltip: { valueFormatter: (val) => val.toFixed(2) + ' GHz' }
                            }
                        );
                    }
                    inst.setOption(opt);
                    this.charts[c.id] = inst;
                });
            },

            _initStats() {
                CONFIG.STATS.forEach(s => {
                    const inst = echarts.init(document.getElementById(`chart-${s.id}`));
                    const opt = this._baseOpt({ 
                        min: s.readouts[0].min, 
                        max: s.readouts[0].max, 
                        axisLabel: { formatter: `{value}${s.readouts[0].unit}` } 
                    });
                    opt.series = s.readouts.map((r) => ({
                        name: r.label, type: 'line', showSymbol: false, 
                        smooth: CONFIG.CHART_SMOOTH,
                        step: CONFIG.CHART_STEP,
                        itemStyle: { color: r.color },
                        areaStyle: r.hasArea ? { opacity: CONFIG.AREA_OPACITY } : null,
                        data: Array(CONFIG.HISTORY_LEN).fill(0),
                        tooltip: { 
                            valueFormatter: (val) => val.toFixed(2) + (r.unit || '')
                        }
                    }));
                    inst.setOption(opt);
                    this.charts[s.id] = inst;
                });
            }
        };

        const UI = {
            renderCards() {
                const topGrid = document.getElementById('grid-top');
                const bottomGrid = document.getElementById('grid-bottom');

                CONFIG.CLUSTERS.forEach(c => {
                    topGrid.innerHTML += `
                    <div class="chart-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 min-w-0 overflow-hidden group" data-title="${c.name} ${c.keywords}">
                        <button onclick="UI.toggleExpand(this, '${c.id}')" class="toggle-btn absolute top-12 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-sm font-bold uppercase tracking-wider" style="color: ${c.color}">${c.name}</h2>
                            <div class="flex gap-3 text-right">
                                <div><span class="text-[9px] text-gray-400 uppercase font-bold block">Avg Load</span><div id="val-${c.id}-load-cur" class="cur-badge text-xs font-bold" style="color: ${c.color}">--%</div></div>
                                <div class="border-l border-gray-100 pl-3"><span class="text-[9px] text-gray-400 uppercase font-bold block">Avg Freq</span><div id="val-${c.id}-freq-cur" class="cur-badge text-xs font-bold opacity-80" style="color: ${c.color}">-- GHz</div></div>
                            </div>
                        </div>
                        <div id="chart-${c.id}" class="chart-container w-full"></div>
                    </div>`;
                });

                CONFIG.STATS.forEach(s => {
                    const keywords = s.readouts.map(r => r.label).join(' ');
                    bottomGrid.innerHTML += `
                    <div class="chart-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 min-w-0 overflow-hidden group" data-title="${s.title} ${s.keywords} ${keywords}">
                        <button onclick="UI.toggleExpand(this, '${s.id}')" class="toggle-btn absolute top-12 right-4 p-1 rounded-md hover:bg-gray-100 text-gray-400 z-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-lg font-semibold text-gray-700">${s.title}</h2>
                            <div class="flex gap-4">
                                ${s.readouts.map((r, i) => `
                                    <div class="text-right ${i > 0 ? 'border-l border-gray-100 pl-4' : ''}">
                                        <span class="text-[10px] text-gray-400 uppercase font-bold block">${r.label}</span>
                                        <div id="val-${r.id}-cur" class="cur-badge text-xs font-bold" style="color: ${r.color}">--${r.unit}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div id="chart-${s.id}" class="chart-container w-full"></div>
                    </div>`;
                });
            },

            setLayout(mode) {
                const gTop = document.getElementById('grid-top'), gBottom = document.getElementById('grid-bottom');
                const bGrid = document.getElementById('btn-grid'), bList = document.getElementById('btn-list');
                if (mode === 'grid') {
                    gTop.classList.remove('grid-cols-1'); gTop.classList.add('md:grid-cols-2', 'lg:grid-cols-3');
                    gBottom.classList.remove('grid-cols-1'); gBottom.classList.add('md:grid-cols-2');
                    bGrid.className = 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white shadow-sm';
                    bList.className = 'px-4 py-1.5 text-sm font-bold text-gray-500';
                } else {
                    gTop.classList.add('grid-cols-1'); gTop.classList.remove('md:grid-cols-2', 'lg:grid-cols-3');
                    gBottom.classList.add('grid-cols-1'); gBottom.classList.remove('md:grid-cols-2');
                    bList.className = 'px-4 py-1.5 rounded-md text-sm font-bold bg-blue-600 text-white shadow-sm';
                    bGrid.className = 'px-4 py-1.5 text-sm font-bold text-gray-500';
                }
                setTimeout(() => Object.values(Monitor.charts).forEach(c => c.resize()), 150);
            },

            toggleExpand(btn, key) {
                const card = btn.closest('.chart-card');
                const isExp = card.classList.toggle('expanded');
                document.body.classList.toggle('modal-open', isExp);
                setTimeout(() => Monitor.charts[key].resize(), 300);
            },

            filterCharts(val) {
                const rawVal = val.toLowerCase().trim();
                const keywords = rawVal.split('|').map(k => k.trim()).filter(k => k.length > 0);
                document.querySelectorAll('.chart-card').forEach(c => {
                    const searchable = c.dataset.title.toLowerCase();
                    const matches = keywords.length === 0 || keywords.some(k => searchable.includes(k));
                    c.classList.toggle('hidden', !matches);
                });
                Object.values(Monitor.charts).forEach(c => c.resize());
            }
        };

        const Sim = {
            interval: null,
            updateRate(ms) {
                clearInterval(this.interval);
                if (ms > 0) this.interval = setInterval(() => this.tick(), ms);
            },
            tick() {
                const load = (base) => Math.max(5, Math.min(95, base + (Math.random() - 0.5) * 40));
                Monitor.push({
                    timestamp: new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' }),
                    cpu: {
                        big:    Array.from({ length: 2 }, () => { const l = load(50); return { load: l, freq: 0.8 + (l/100)*2.4 }; }),
                        mid:    Array.from({ length: 2 }, () => { const l = load(30); return { load: l, freq: 0.6 + (l/100)*1.8 }; }),
                        little: Array.from({ length: 4 }, () => { const l = load(10); return { load: l, freq: 0.4 + (l/100)*1.4 }; })
                    },
                    temp: { pkg: 45 + Math.random() * 30, gpu: 40 + Math.random() * 20 },
                    power: { pkg: 10 + Math.random() * 80, dram: 2 + Math.random() * 8 },
                    fps: 58 + Math.random() * 6
                });
            }
        };

        Monitor.init();

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const exp = document.querySelector('.chart-card.expanded');
                if (exp) {
                    const btn = exp.querySelector('button');
                    const title = exp.dataset.title.toLowerCase();
                    const key = title.includes('big') ? 'big' : title.includes('mid') ? 'mid' : title.includes('little') ? 'little' : 
                                title.includes('temp') ? 'temp' : title.includes('power') ? 'power' : title.includes('frame') ? 'fps' : 'eff';
                    UI.toggleExpand(btn, key);
                }
            }
        });
    </script>
</body>
</html>
